# Secret Reference Registry
# Cell: proxmox-cell-a
#
# This file tracks KeePass path references for all secrets used in this cell.
# It NEVER contains secret values. It contains only the paths needed to retrieve them.
#
# Format:
#   id:             Stable unique identifier referenced in Bootstrap State and Service Contracts
#   description:    What this secret is
#   keepass_path:   Full KeePass entry path
#   owning_cell:    cell_id of the cell whose KeePass holds this secret
#   secret_type:    password | ssh-private-key | api-token | certificate-private-key | other
#   required_by:    List of components (host:X or vm:X) that need this secret
#   required_for:   List of operations this secret enables
#   rotation_schedule: Human-readable schedule or null

secrets:
  - id: pve01-root-password
    description: Proxmox host root password
    keepass_path: Infrastructure/proxmox/pve01-root
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [host:pve01]
    required_for: [ssh-access, pve-api-auth]
    rotation_schedule: annually

  - id: pve01-api-token
    description: Proxmox API token for OpenTofu provider
    keepass_path: Infrastructure/proxmox/pve01-tofu-token
    owning_cell: proxmox-cell-a
    secret_type: api-token
    required_by: [host:pve01]
    required_for: [opentofu-execution]
    rotation_schedule: annually

  - id: infra-bootstrap-deploy-key
    description: SSH deploy key for infra-bootstrap VM
    keepass_path: Infrastructure/ssh/deploy-keys/infra-bootstrap
    owning_cell: proxmox-cell-a
    secret_type: ssh-private-key
    required_by: [vm:infra-bootstrap]
    required_for: [ansible-execution]
    rotation_schedule: null

  - id: forgejo-deploy-key
    description: SSH deploy key for forgejo VM
    keepass_path: Infrastructure/ssh/deploy-keys/forgejo
    owning_cell: proxmox-cell-a
    secret_type: ssh-private-key
    required_by: [vm:forgejo]
    required_for: [ansible-execution]
    rotation_schedule: null

  - id: inventory-deploy-key
    description: SSH deploy key for inventory VM
    keepass_path: Infrastructure/ssh/deploy-keys/inventory
    owning_cell: proxmox-cell-a
    secret_type: ssh-private-key
    required_by: [vm:inventory]
    required_for: [ansible-execution]
    rotation_schedule: null

  - id: assessment-engine-deploy-key
    description: SSH deploy key for assessment-engine VM
    keepass_path: Infrastructure/ssh/deploy-keys/assessment-engine
    owning_cell: proxmox-cell-a
    secret_type: ssh-private-key
    required_by: [vm:assessment-engine]
    required_for: [ansible-execution]
    rotation_schedule: null

  - id: vm-100-password
    description: Initial OS user password for infra-bootstrap VM
    keepass_path: Infrastructure/vms/vm-100-ubuntu-password
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [vm:infra-bootstrap]
    required_for: [first-boot-access]
    rotation_schedule: null

  - id: vm-101-password
    description: Initial OS user password for forgejo VM
    keepass_path: Infrastructure/vms/vm-101-ubuntu-password
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [vm:forgejo]
    required_for: [first-boot-access]
    rotation_schedule: null

  - id: vm-102-password
    description: Initial OS user password for inventory VM
    keepass_path: Infrastructure/vms/vm-102-ubuntu-password
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [vm:inventory]
    required_for: [first-boot-access]
    rotation_schedule: null

  - id: vm-103-password
    description: Initial OS user password for assessment-engine VM
    keepass_path: Infrastructure/vms/vm-103-ubuntu-password
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [vm:assessment-engine]
    required_for: [first-boot-access]
    rotation_schedule: null

  - id: forgejo-admin-password
    description: Forgejo administrator account password
    keepass_path: Infrastructure/forgejo/admin-password
    owning_cell: proxmox-cell-a
    secret_type: password
    required_by: [vm:forgejo]
    required_for: [post-restore-validation, service-administration]
    rotation_schedule: annually
